services:

  nginx:
    build: ./nginx
    container_name: uti_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - fastapi
    restart: always
    networks:
      - uti_network

  fastapi:
    build: ./fastapi
    container_name: uti_fastapi
    env_file: .env
    volumes:
      - ./fastapi:/app
      - uploads_data:/app/uploads
    depends_on:
      - redis
      - ollama
    restart: always
    networks:
      - uti_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  celery_worker:
    build:
      context: ./fastapi
      dockerfile: ../celery_worker/Dockerfile
    container_name: uti_celery
    env_file: .env
    volumes:
      - ./fastapi:/app
      - uploads_data:/app/uploads
    depends_on:
      - redis
      - fastapi
    restart: always
    networks:
      - uti_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: celery -A tasks.ingestion_tasks worker --loglevel=info --concurrency=2

  redis:
    image: redis:7-alpine
    container_name: uti_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - uti_network
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

  ollama:
    build: ./ollama
    container_name: uti_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - uti_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  redis_data:
  ollama_data:
  uploads_data:
  certbot_www:
  certbot_conf:

networks:
  uti_network:
    driver: bridge
